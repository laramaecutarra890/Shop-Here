<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimalist Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #e4e3fd;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #ffffff;
        padding: 25px;
        width: 420px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .form-group {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
    }

    .form-group label {
        width: 140px;
        font-size: 14px;
        font-weight: bold;
    }

    .form-group input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #000;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .register-btn {
        background: #000;
        color: #fff;
    }

    .cancel-btn {
        background: #ccc;
    }

    .success-message {
        display: none;
        text-align: center;
        color: green;
        font-weight: bold;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Registration Form</h2>

    <div class="success-message" id="successMessage">You Are Successfully Register!</div>

    <form id="registrationForm">

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Hoyle">
        </div>

        <div class="form-group">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="Ruben">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="hoyleruben@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password">
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="+63 912 345 6789">
        </div>

        <div class="form-group">
            <label>Nationality</label>
            <input type="text" id="nationality" placeholder="Filipino">
        </div>  

        <div class="form-group">
            <label>Country of Residence</label>
            <input type="text" id="country" placeholder="Philippines">
        </div>

        <div class="form-group">
            <label>Street Address</label>
            <input type="text" id="address" placeholder="123 Street Name">
        </div>

        <div class="form-group">
            <label>ZIP/Postal Code</label>
            <input type="text" id="zip" placeholder="1000">
        </div>

        <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="company" placeholder="Hoyle Corporation">
        </div>

        <div class="form-group">
            <label>Role/Job Title</label>
            <input type="text" id="job" placeholder="Software Developer">
        </div>

        <button type="button" class="btn register-btn" onclick="registerUser()">Register</button>
        <button type="button" class="btn cancel-btn" onclick="cancelRegister()">Cancel</button>
    </form>
</div>

<script>
function registerUser() {
    let inputs = document.querySelectorAll("input");
    let isValid = true;

    inputs.forEach(input => {
        if (input.value.trim() === "") {
            input.value = "";
            input.placeholder = "Required Field!";
            input.style.borderColor = "red";
            isValid = false;
        } else {
            input.style.borderColor = "#ccc";
        }
    });

    if (!isValid) return;

    document.getElementById("successMessage").style.display = "block";

    setTimeout(() => {
        window.location.href = "LOGIN.HTML"; 
    }, 2000);
}

function cancelRegister() {
    window.location.href = "LOGIN.HTML"; 
}
</script>

</body>
</html>
